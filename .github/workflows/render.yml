on:
  push:
    branches: [main]

name: Render and Publish

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev pandoc \
            libcurl4-openssl-dev \
            libfreetype6-dev libpng-dev libtiff5-dev libjpeg-dev \
            libfontconfig1-dev libfribidi-dev libharfbuzz-dev

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: quarto-dev/quarto-actions/setup@v2

      - uses: r-lib/actions/setup-r@v2

      - uses: r-lib/actions/setup-renv@v2
        with:
          cache-version: 1

      - name: Install Chrome Headless Shell
        run: quarto install chrome-headless-shell

      - name: Install TinyTeX
        run: quarto install tinytex --update-path

      - name: Render Quarto site
        run: quarto render

      - name: Show rendered files
        run: |
          find docs -maxdepth 5 -type f | sort

      - name: Install DeckTape
        run: npm install -g decktape

      - name: Create PDFs from rendered HTML
        run: |
          mkdir -p docs/downloads

          find docs/slides -type f -name "*.html" | while read -r html; do
            rel="${html#docs/}"
            qmd="${rel%.html}.qmd"
            pdf="docs/downloads/$(basename "${html%.html}").pdf"
            tmp_pdf="$(basename "${html%.html}").pdf"

            echo "----------------------------------------"
            echo "HTML: $html"
            echo "QMD:  $qmd"
            echo "PDF:  $pdf"

            if grep -q 'class="reveal"' "$html" || grep -q 'Reveal.initialize' "$html"; then
              echo "Detected revealjs -> using DeckTape"
              decktape \
                --chrome-arg=--no-sandbox \
                --chrome-arg=--disable-dev-shm-usage \
                reveal \
                "file://$GITHUB_WORKSPACE/$html" \
                "$pdf"
            else
              echo "Detected ordinary HTML page -> using Quarto PDF"
              quarto render "$qmd" --to pdf --output "$tmp_pdf"

              if [ -f "$tmp_pdf" ]; then
                mv "$tmp_pdf" "$pdf"
              elif [ -f "${qmd%.qmd}.pdf" ]; then
                mv "${qmd%.qmd}.pdf" "$pdf"
              else
                echo "PDF was not produced for $qmd"
                exit 1
              fi
            fi
          done

      - name: Verify PDFs exist
        run: |
          echo "Generated PDFs:"
          find docs/downloads -maxdepth 1 -type f -name "*.pdf" | sort

      - name: Show files after PDF creation
        run: |
          find docs -maxdepth 5 -type f | sort

      - uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
          render: false