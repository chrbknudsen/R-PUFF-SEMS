on:
  push:
    branches: [main]

name: Render and Publish

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev pandoc \
            libcurl4-openssl-dev \
            libfreetype6-dev libpng-dev libtiff5-dev libjpeg-dev \
            libfontconfig1-dev libfribidi-dev libharfbuzz-dev

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: quarto-dev/quarto-actions/setup@v2

      - uses: r-lib/actions/setup-r@v2

      - uses: r-lib/actions/setup-renv@v2
        with:
          cache-version: 1

      - name: Install Chrome Headless Shell
        run: quarto install chrome-headless-shell

      - name: Install TinyTeX
        run: quarto install tinytex --update-path

      - name: Install DeckTape
        run: npm install -g decktape

      - name: Clean previous rendered site
        run: |
          rm -rf docs

      - name: Render Quarto site
        run: quarto render

      - name: Show rendered files
        run: |
          find docs -maxdepth 5 -type f | sort

      - name: Create PDFs from source qmd files
        run: |
          set -euo pipefail

          mkdir -p docs/downloads

          shopt -s nullglob
          for qmd in slides/*.qmd; do
            base="$(basename "${qmd%.qmd}")"
            html="docs/slides/${base}.html"
            pdf="docs/downloads/${base}.pdf"

            tmp_pdf="${base}.pdf"
            docs_pdf="docs/${base}.pdf"
            slides_pdf="slides/${base}.pdf"

            echo "----------------------------------------"
            echo "QMD:  $qmd"
            echo "HTML: $html"
            echo "PDF:  $pdf"

            if [ ! -f "$html" ]; then
              echo "Expected rendered HTML not found: $html"
              exit 1
            fi

            if grep -q 'class="reveal"' "$html" || grep -q 'Reveal.initialize' "$html"; then
              echo "Detected revealjs -> using DeckTape on rendered HTML"

              decktape \
                --chrome-arg=--no-sandbox \
                --chrome-arg=--disable-dev-shm-usage \
                reveal \
                "file://$GITHUB_WORKSPACE/$html" \
                "$pdf"

            else
              echo "Detected ordinary HTML page -> rendering source qmd to PDF"

              rm -f "$tmp_pdf" "$docs_pdf" "$slides_pdf" "$pdf"

              quarto render "$qmd" --to pdf --output "$tmp_pdf"

              if [ -f "$tmp_pdf" ]; then
                mv "$tmp_pdf" "$pdf"
              elif [ -f "$slides_pdf" ]; then
                mv "$slides_pdf" "$pdf"
              elif [ -f "$docs_pdf" ]; then
                mv "$docs_pdf" "$pdf"
              else
                echo "PDF was not produced for $qmd"
                echo "Checked:"
                echo "  $tmp_pdf"
                echo "  $slides_pdf"
                echo "  $docs_pdf"
                find . -maxdepth 3 -type f -name "*.pdf" | sort
                exit 1
              fi
            fi
          done

      - name: Verify PDFs exist
        run: |
          echo "Generated PDFs:"
          find docs/downloads -maxdepth 1 -type f -name "*.pdf" | sort

      - name: Show files after PDF creation
        run: |
          find docs -maxdepth 5 -type f | sort

      - uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
          render: false