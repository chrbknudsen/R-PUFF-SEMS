on:
  push:
    branches: [main]

name: Render and Publish

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev pandoc \
            libcurl4-openssl-dev \
            libfreetype6-dev libpng-dev libtiff5-dev libjpeg-dev \
            libfontconfig1-dev libfribidi-dev libharfbuzz-dev

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: quarto-dev/quarto-actions/setup@v2

      - uses: r-lib/actions/setup-r@v2

      - uses: r-lib/actions/setup-renv@v2

      - name: Install Chrome Headless Shell
        run: quarto install chrome-headless-shell

      - name: Render Quarto site
        run: quarto render

      - name: Install DeckTape
        run: npm install -g decktape

      - name: Create PDF
        run: |
          mkdir -p docs/downloads
          decktape \
            --chrome-arg=--no-sandbox \
            reveal \
            "file://$GITHUB_WORKSPACE/docs/slides/intro.html" \
            "docs/downloads/intro.pdf"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4