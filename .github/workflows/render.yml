on:
  push:
    branches: [main]

name: Render and Publish

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev pandoc \
            libcurl4-openssl-dev \
            libfreetype6-dev libpng-dev libtiff5-dev libjpeg-dev \
            libfontconfig1-dev libfribidi-dev libharfbuzz-dev

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: quarto-dev/quarto-actions/setup@v2

      - uses: r-lib/actions/setup-r@v2

      - uses: r-lib/actions/setup-renv@v2
        with:
          cache-version: 1

      - name: Install Chrome Headless Shell
        run: quarto install chrome-headless-shell

      - name: Install TinyTeX
        run: quarto install tinytex --update-path

      - name: Render Quarto site
        run: quarto render

      - name: Install DeckTape
        run: npm install -g decktape

      - name: Create PDFs from revealjs slides
        run: |
          mkdir -p docs/downloads

          find slides -type f -name "*.qmd" ! -name "powerberegninger_notat.qmd" | while read -r qmd; do
            rel_no_ext="${qmd%.qmd}"
            html="docs/${rel_no_ext}.html"
            pdf_name="$(basename "${rel_no_ext}").pdf"
            pdf="docs/downloads/${pdf_name}"

            echo "----------------------------------------"
            echo "QMD:  $qmd"
            echo "HTML: $html"
            echo "PDF:  $pdf"

            if [ -f "$html" ]; then
              decktape \
                --chrome-arg=--no-sandbox \
                --chrome-arg=--disable-dev-shm-usage \
                reveal \
                "file://$GITHUB_WORKSPACE/$html" \
                "$pdf"
            else
              echo "HTML file not found, skipping: $html"
            fi
          done

      - name: Render ordinary page as PDF
        run: |
          mkdir -p docs/downloads
          quarto render slides/powerberegninger_notat.qmd --to pdf --output powerberegninger_notat.pdf
          mv slides/powerberegninger_notat.pdf docs/downloads/powerberegninger_notat.pdf

      - name: Verify PDFs exist
        run: |
          find docs/downloads -maxdepth 1 -type f -name "*.pdf" | sort

      - uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
          render: false